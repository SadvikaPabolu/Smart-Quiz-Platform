            display: flex;
            justify-content: space-between;

        .logo {

            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: #4f46e5;
        }

        .logo i {
            font-size: 2rem;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-menu a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: #4f46e5;
        }

        .profile-menu {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            position: relative;
        }

        .profile-icon {
            width: 40px;
            height: 40px;
            background: #4f46e5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        /* Improved image avatar rendering */
        img.profile-icon {
            background: none;
            object-fit: cover;
            display: block;
            image-rendering: -webkit-optimize-contrast;
        }

        .profile-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 200px;
            display: none;
            z-index: 1000;
        }

        .profile-menu:hover .profile-dropdown {
            display: block;
        }

        .profile-dropdown a {
            display: block;
            padding: 0.8rem 1rem;
            text-decoration: none;
            color: #333;
            transition: background 0.3s;
        }

        .profile-dropdown a:hover {
            background: #f3f4f6;
        }

        .profile-dropdown i {
            margin-right: 0.5rem;
            color: #4f46e5;
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: #666;
            font-size: 1.1rem;
        }

        .filter-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .time-filter {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .time-btn {
            padding: 0.6rem 1.5rem;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .time-btn:hover,
        .time-btn.active {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }

        .search-box {

            align-items: center;
            background: white;
            border: 2px solid #e5e7eb;

            min-width: 250px;
            max-width: 300px;

        .podium {

            color: #666;

            border-bottom: 1px solid #e5e7eb;

        .rank-cell {

            align-items: center;

            height: 40px;
            border-radius: 50%;
            background: #4f46e5;

            align-items: center;
            justify-content: center;
            color: white;

        .accuracy-cell.medium {

        }

        }

            padding: 3rem;

        .pagination {

            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;

        .page-btn {

            height: 40px;
            border-radius: 10px;
            border: 2px solid #e5e7eb;
            background: white;

            color: white;
            border-color: #4f46e5;

            padding: 2rem;

            color: #4f46e5;

            0% { transform: rotate(0deg); }

            .nav-menu {

                flex-direction: column;
                align-items: center;

                display: none;
            }
            
            .table-row {
                grid-template-columns: 1fr;
                gap: 0.5rem;
                padding: 1rem;

                align-items: stretch;
            }

                max-width: 100%;

    <script>
        // ==================== PERSISTENT STORAGE HELPERS ====================
        function loadTeacherProfile(email) {
            const profiles = JSON.parse(localStorage.getItem('teacherProfiles')) || {};
            return profiles[email] || null;
        }

        // ==================== LOAD CURRENT USER ====================
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || { name: 'John Student', email: 'student@demo.com' };

        // Restore photo from persistent store if missing (teacher view)
        if (!currentUser.hasOwnProperty('photoDataURL')) {
            const storedProfile = loadTeacherProfile(currentUser.email);
            if (storedProfile && storedProfile.photoDataURL) {
                currentUser.photoDataURL = storedProfile.photoDataURL;
            } else {
                currentUser.photoDataURL = null;
            }
        }

        // Update profile initials and name (temporary, will be replaced by image)
        document.getElementById('profileInitials').textContent = currentUser.name.split(' ').map(n => n[0]).join('').toUpperCase();
        document.getElementById('profileName').textContent = currentUser.name;

        // Helper to get teacher photo source (PNG)
        function getTeacherPhotoSrc() {
            if (currentUser.photoDataURL) {
                return currentUser.photoDataURL;
            }
            return `/photos/${encodeURIComponent(currentUser.name)}.png`;
        }

        // ==================== NAVBAR ICON UPDATE ====================
        function updateNavbarIcon() {
            const profileMenu = document.querySelector('.profile-menu');
            if (!profileMenu) return;

            const initials = currentUser.name.split(' ').map(n => n[0]).join('').toUpperCase();
            const photoSrc = getTeacherPhotoSrc();

            // Remove the existing profile icon (div with id profileInitials if it's still there)
            const oldIcon = profileMenu.querySelector('.profile-icon');
            if (oldIcon) oldIcon.remove();

            // Create wrapper to hold both image and fallback
            const wrapper = document.createElement('div');
            wrapper.style.position = 'relative';
            wrapper.style.display = 'inline-block';

            // Create image
            const img = document.createElement('img');
            img.className = 'profile-icon';
            img.src = photoSrc;
            img.alt = 'Teacher';
            img.onerror = function() {
                this.style.display = 'none';
                fallback.style.display = 'flex';
            };

            // Create fallback div (initially hidden)
            const fallback = document.createElement('div');
            fallback.className = 'profile-icon';
            fallback.id = 'profileInitials'; // keep id for any references
            fallback.textContent = initials;
            fallback.style.display = 'none'; // hidden initially

            wrapper.appendChild(img);
            wrapper.appendChild(fallback);

            // Insert the wrapper before the chevron
            const chevron = profileMenu.querySelector('.fa-chevron-down');
            profileMenu.insertBefore(wrapper, chevron);
        }

        // Call it immediately
        updateNavbarIcon();

        // CORRECTED PATH TO PHOTOS FOLDER (based on your file structure)
        // ------------------------------------------------------------------

            }
            // Fallback to student name + .jpg (if no custom image field)

        };

        let currentPeriod = 'week';
        let currentPage = 1;
        const rowsPerPage = 10;
        let filteredData = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderLeaderboard('week');
            attachEventListeners();
        });

        function attachEventListeners() {
            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const period = this.dataset.period;
                    currentPeriod = period;
                    currentPage = 1;
                    renderLeaderboard(period);
                });
            });

            document.getElementById('searchInput').addEventListener('input', function(e) {
                const searchTerm = e.target.value.toLowerCase();
                filterData(searchTerm);
            });
        }

        function renderLeaderboard(period) {
            const data = leaderboardData[period] || [];
            data.sort((a, b) => b.score - a.score);
            window.fullData = data;
            updatePodium(data.slice(0, 3));
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            filterData(searchTerm);
        }

        function filterData(searchTerm) {
            if (!window.fullData) return;
            if (!searchTerm) {
                filteredData = [...window.fullData];
            } else {
                filteredData = window.fullData.filter(user => 
                    user.name.toLowerCase().includes(searchTerm)
                );
            }
            updateTableAndPagination();
        }

        function updateTableAndPagination() {
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const paginatedData = filteredData.slice(start, end);
            renderTable(paginatedData);
            renderPagination();
        }

        function renderTable(data) {
            const tbody = document.getElementById('leaderboardBody');
            if (data.length === 0) {
                tbody.innerHTML = '<div class="no-results"><i class="fas fa-search"></i> No matching students found.</div>';
                return;
            }

            let html = '';
            data.forEach((user, index) => {
                const globalRank = filteredData.indexOf(user) + 1;
                const rankClass = globalRank === 1 ? 'top-1' : globalRank === 2 ? 'top-2' : globalRank === 3 ? 'top-3' : '';
                
                let accuracyClass = 'low';
                if (user.accuracy >= 90) accuracyClass = 'high';
                else if (user.accuracy >= 75) accuracyClass = 'medium';
                
                const isCurrentUser = user.name === currentUser.name;

                html += `
                    <div class="table-row ${isCurrentUser ? 'current-user' : ''}">
                        <div class="rank-cell ${rankClass}">${globalRank}</div>
                        <div class="user-cell">
                            <img class="user-avatar" src="${getUserImageUrl(user)}" alt="${user.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                            <div class="user-avatar" style="display:none;">${user.initials}</div>
                            <div class="user-info">
                                <h4>${user.name}</h4>
                                <p>${user.grade}</p>
                            </div>
                        </div>
                        <div class="score-cell">${user.score.toLocaleString()}</div>
                        <div class="quizzes-cell">${user.quizzes}</div>
                        <div class="accuracy-cell ${accuracyClass}">${user.accuracy}%</div>
                    </div>
                `;
            });
            tbody.innerHTML = html;
        }

        function updatePodium(topThree) {
            const podiumContainer = document.getElementById('podiumContainer');
            if (topThree.length < 3) {
                podiumContainer.innerHTML = '<p style="text-align:center;">Not enough participants</p>';
                return;
            }

            const podiumHtml = `
                <!-- Second Place -->
                <div class="podium-item second">
                    <div class="crown">🥈</div>
                    <img class="podium-avatar" src="${getUserImageUrl(topThree[1])}" alt="${topThree[1].name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="podium-avatar" style="display:none;">${topThree[1].initials}</div>
                    <div class="podium-info">
                        <h3>${topThree[1].name}</h3>
                        <div class="score">${topThree[1].score.toLocaleString()} pts</div>
                        <div class="quizzes">${topThree[1].quizzes} quizzes</div>
                    </div>
                </div>
                <!-- First Place -->
                <div class="podium-item first">
                    <div class="crown">👑</div>
                    <img class="podium-avatar" src="${getUserImageUrl(topThree[0])}" alt="${topThree[0].name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="podium-avatar" style="display:none;">${topThree[0].initials}</div>
                    <div class="podium-info">
                        <h3>${topThree[0].name}</h3>
                        <div class="score">${topThree[0].score.toLocaleString()} pts</div>
                        <div class="quizzes">${topThree[0].quizzes} quizzes</div>
                    </div>
                </div>
                <!-- Third Place -->
                <div class="podium-item third">
                    <div class="crown">🥉</div>
                    <img class="podium-avatar" src="${getUserImageUrl(topThree[2])}" alt="${topThree[2].name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="podium-avatar" style="display:none;">${topThree[2].initials}</div>
                    <div class="podium-info">
                        <h3>${topThree[2].name}</h3>
                        <div class="score">${topThree[2].score.toLocaleString()} pts</div>
                        <div class="quizzes">${topThree[2].quizzes} quizzes</div>
                    </div>
                </div>
            `;
            podiumContainer.innerHTML = podiumHtml;
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / rowsPerPage);
            const paginationDiv = document.getElementById('pagination');
            if (totalPages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }

            let paginationHtml = '';
            for (let i = 1; i <= totalPages; i++) {
                paginationHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
            }
            if (currentPage < totalPages) {
                paginationHtml += `<button class="page-btn" data-page="${currentPage + 1}">→</button>`;
            }
            paginationDiv.innerHTML = paginationHtml;

            document.querySelectorAll('.page-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const page = parseInt(this.dataset.page);
                    if (!isNaN(page)) {
                        currentPage = page;
                        updateTableAndPagination();
                    }
                });
            });
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = '../index.html';
        }
    </script>
</body>
